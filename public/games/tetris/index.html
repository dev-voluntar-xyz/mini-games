<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center;
            background: #222; color: white; font-family: sans-serif;
            margin: 0; padding: 20px;
        }
        canvas { background: #000; border: 2px solid #444; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #score-board { display: flex; justify-content: space-between; width: 240px; margin-bottom: 10px; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 50px 50px 50px; gap: 10px; }
        .btn { padding: 15px; background: #444; border: none; color: white; border-radius: 5px; cursor: pointer; user-select: none; font-size: 16px; display: flex; justify-content: center; align-items: center;}
        .btn:active { background: #666; }
        #btn-rotate { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <h2 id="level-title">Tetris</h2>
    <div id="score-board">
        <span id="score-text">Score: 0</span>
        <span id="high-score-text">High Score: 0</span>
    </div>
    <canvas id="gameCanvas" width="240" height="400"></canvas>

    <div class="controls">
        <button class="btn" id="btn-rotate">↻</button>
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-down">▼</button>
        <button class="btn" id="btn-right">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const ROWS = 20;
        const COLS = 12;
        const BLOCK_SIZE = 20;

        let board = [];
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                board[r][c] = 0;
            }
        }

        const TETROMINOS = [
            [], // 0: empty
            [[1, 1, 1, 1]], // 1: I (Cyan)
            [[1, 1], [1, 1]], // 2: O (Yellow)
            [[0, 1, 0], [1, 1, 1]], // 3: T (Purple)
            [[1, 0, 0], [1, 1, 1]], // 4: L (Orange)
            [[0, 0, 1], [1, 1, 1]], // 5: J (Blue)
            [[0, 1, 1], [1, 1, 0]], // 6: S (Green)
            [[1, 1, 0], [0, 1, 1]]  // 7: Z (Red)
        ];

        const COLORS = [
            null,
            'cyan',
            'yellow',
            'purple',
            'orange',
            'blue',
            'green',
            'red'
        ];

        let score = 0;
        let highScore = 0;
        let dropSpeed = 800;
        let isGameOver = false;

        let piece = {
            matrix: [],
            r: 0,
            c: 0,
            colorId: 0
        };

        let dropCounter = 0;
        let lastTime = 0;

        const updateScoreDisplays = () => {
            document.getElementById('score-text').innerText = 'Score: ' + score;
            document.getElementById('high-score-text').innerText = 'High Score: ' + highScore;
        };

        const resetGame = () => {
            board.forEach(row => row.fill(0));
            score = 0;
            isGameOver = false;
            spawnPiece();
            updateScoreDisplays();
        };

        const saveProgress = async () => {
            if (window.GameAPI) {
                await window.GameAPI.setProgress(JSON.stringify({ highScore }));
            }
        };

        const spawnPiece = () => {
            const id = Math.floor(Math.random() * 7) + 1;
            const matrix = TETROMINOS[id];

            piece.matrix = matrix;
            piece.colorId = id;
            piece.r = 0;
            piece.c = Math.floor((COLS - matrix[0].length) / 2);

            if (collide(board, piece)) {
                isGameOver = true;
            }
        };

        const collide = (board, piece) => {
            const m = piece.matrix;
            for (let r = 0; r < m.length; r++) {
                for (let c = 0; c < m[r].length; c++) {
                    if (m[r][c] !== 0 &&
                        (board[piece.r + r] && board[piece.r + r][piece.c + c]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        };

        const merge = (board, piece) => {
            piece.matrix.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value !== 0) {
                        board[piece.r + r][piece.c + c] = piece.colorId;
                    }
                });
            });
        };

        const rotate = (matrix) => {
            const N = matrix.length;
            const M = matrix[0].length;
            let result = new Array(M).fill(0).map(() => new Array(N).fill(0));

            for (let r = 0; r < N; r++) {
                for (let c = 0; c < M; c++) {
                    result[c][N - 1 - r] = matrix[r][c];
                }
            }
            return result;
        };

        const playerRotate = () => {
            const originalMatrix = piece.matrix;
            const originalC = piece.c;

            piece.matrix = rotate(piece.matrix);

            // Wall kick
            let offset = 1;
            while (collide(board, piece)) {
                piece.c += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > piece.matrix[0].length) {
                    // Rotate back if can't resolve collision
                    piece.matrix = originalMatrix;
                    piece.c = originalC;
                    return;
                }
            }
        };

        const playerMove = (dir) => {
            piece.c += dir;
            if (collide(board, piece)) {
                piece.c -= dir;
            }
        };

        const playerDrop = () => {
            piece.r++;
            if (collide(board, piece)) {
                piece.r--;
                merge(board, piece);
                spawnPiece();
                clearLines();
            }
            dropCounter = 0;
        };

        const clearLines = () => {
            let linesCleared = 0;
            outer: for (let r = ROWS - 1; r >= 0; r--) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] === 0) {
                        continue outer;
                    }
                }

                // Line is full
                const row = board.splice(r, 1)[0].fill(0);
                board.unshift(row);
                r++; // Re-check the current row index since board shifted down
                linesCleared++;
            }

            if (linesCleared > 0) {
                score += linesCleared * 100;
                if (score > highScore) {
                    highScore = score;
                    saveProgress();
                }
                updateScoreDisplays();
            }
        };

        const drawMatrix = (matrix, offset) => {
            matrix.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value !== 0) {
                        ctx.fillStyle = COLORS[value] || COLORS[piece.colorId];
                        ctx.fillRect((c + offset.c) * BLOCK_SIZE, (r + offset.r) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect((c + offset.c) * BLOCK_SIZE, (r + offset.r) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                });
            });
        };

        const draw = () => {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(board, {r: 0, c: 0});
            drawMatrix(piece.matrix, {r: piece.r, c: piece.c});

            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "16px Arial";
                ctx.fillText("Tap or press space to restart", canvas.width / 2, canvas.height / 2 + 20);
            }
        };

        const update = (time = 0) => {
            if (isGameOver) {
                draw();
                return;
            }

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropSpeed) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        };

        document.addEventListener('keydown', event => {
            if (isGameOver && event.code === 'Space') {
                resetGame();
                update();
                return;
            }
            if (isGameOver) return;

            if (event.key === 'ArrowLeft') {
                playerMove(-1);
            } else if (event.key === 'ArrowRight') {
                playerMove(1);
            } else if (event.key === 'ArrowDown') {
                playerDrop();
            } else if (event.key === 'ArrowUp') {
                playerRotate();
            }
        });

        // Touch controls
        document.getElementById('btn-rotate').addEventListener('pointerdown', (e) => { e.preventDefault(); if(isGameOver) {resetGame(); update();} else playerRotate(); });
        document.getElementById('btn-down').addEventListener('pointerdown', (e) => { e.preventDefault(); if(isGameOver) return; playerDrop(); });
        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); if(isGameOver) return; playerMove(-1); });
        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); if(isGameOver) return; playerMove(1); });


        const initGame = async () => {
            if (window.GameAPI) {
                try {
                    // Load progress
                    const progressDataStr = await window.GameAPI.getProgress();
                    if (progressDataStr) {
                        const progress = JSON.parse(progressDataStr);
                        if (progress.highScore) {
                            highScore = progress.highScore;
                        }
                    }

                    // Load level
                    const currentLevelInfo = await window.GameAPI.getCurrentLevel();
                    if (currentLevelInfo && currentLevelInfo.levelHtml) {
                        try {
                           const levelData = JSON.parse(currentLevelInfo.levelHtml);
                           document.getElementById('level-title').innerText = levelData.title || ('Tetris - Level ' + currentLevelInfo.levelNumber);

                           if (levelData.dropSpeed) {
                               dropSpeed = levelData.dropSpeed;
                           }
                        } catch(e) {
                           document.getElementById('level-title').innerText = 'Tetris - Level ' + currentLevelInfo.levelNumber;
                        }
                    }
                } catch(e) {
                    console.error('Error initing Game API', e);
                }
            }
            updateScoreDisplays();
            spawnPiece();
            update();
        };

        // Initialize when API is ready
        if (window.GameAPI) {
            initGame();
        } else {
            window.addEventListener('GameAPIReady', initGame);
        }
    </script>
</body>
</html>
