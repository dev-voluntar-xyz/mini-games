
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center;
            background: #111; color: white; font-family: sans-serif;
            margin: 0; padding: 20px;
        }
        canvas { background: #eee; border: 2px solid #444; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #header-info { display: flex; justify-content: space-between; width: 480px; margin-bottom: 10px; }
        .controls-info { margin-top: 10px; color: #aaa; font-size: 0.9em; text-align: center;}
    </style>
</head>
<body>
    <h2 id="level-title">Breakout</h2>
    <div id="header-info">
        <span id="score-text">Score: 0</span>
        <span id="high-score-text">High Score: 0</span>
    </div>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <div class="controls-info">
        Controls: Left/Right Arrows or touch sides of screen. Press Space to restart.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game state
        let score = 0;
        let highScore = 0;
        let gameOver = false;
        let gameWon = false;
        let animationId;

        // Ball
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 2.5;
        let dy = -2.5;

        // Paddle
        let paddleHeight = 10;
        let paddleWidth = 75;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // Bricks
        let brickRowCount = 3;
        let brickColumnCount = 5;
        let brickWidth = 75;
        let brickHeight = 20;
        let brickPadding = 10;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 30;
        let bricks = [];

        const initBricks = () => {
            bricks = [];
            for(let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for(let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        };

        const updateScoreDisplay = () => {
            document.getElementById('score-text').innerText = 'Score: ' + score;
            document.getElementById('high-score-text').innerText = 'High Score: ' + highScore;
        };

        // Touch controls
        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});
        canvas.addEventListener('touchend', () => {
            rightPressed = false;
            leftPressed = false;
        });

        function handleTouch(e) {
            e.preventDefault();
            if (gameOver || gameWon) {
                resetGame();
                return;
            }
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;

            // Adjust paddle position directly to touch
            paddleX = touchX - paddleWidth / 2;
            if(paddleX < 0) paddleX = 0;
            if(paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = true;
            }
            else if(e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = true;
            }
            if ((gameOver || gameWon) && e.code === 'Space') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if(e.key === "Right" || e.key === "ArrowRight") {
                rightPressed = false;
            }
            else if(e.key === "Left" || e.key === "ArrowLeft") {
                leftPressed = false;
            }
        });

        const resetGame = () => {
            x = canvas.width / 2;
            y = canvas.height - 30;
            let speed = Math.sqrt(dx*dx + dy*dy);
            if (speed === 0) speed = 2.828;
            dx = speed * 0.707;
            dy = -speed * 0.707;
            paddleX = (canvas.width - paddleWidth) / 2;
            score = 0;
            gameOver = false;
            gameWon = false;
            initBricks();
            updateScoreDisplay();
            if (animationId) cancelAnimationFrame(animationId);
            draw();
        };

        const collisionDetection = () => {
            for(let c = 0; c < brickColumnCount; c++) {
                for(let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if(b.status === 1) {
                        if(x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score++;
                            if(score > highScore) {
                                highScore = score;
                                saveProgress();
                            }
                            updateScoreDisplay();
                            if(score === brickRowCount * brickColumnCount) {
                                gameWon = true;
                            }
                        }
                    }
                }
            }
        };

        const drawBall = () => {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI*2);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        };

        const drawPaddle = () => {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = "#0095DD";
            ctx.fill();
            ctx.closePath();
        };

        const drawBricks = () => {
            for(let c = 0; c < brickColumnCount; c++) {
                for(let r = 0; r < brickRowCount; r++) {
                    if(bricks[c][r].status === 1) {
                        let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = "#0095DD";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        };

        const draw = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            if (gameWon) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('You Win!', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('Press Space to Restart', canvas.width / 2, canvas.height / 2 + 40);
                return;
            }

            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if(y + dy < ballRadius) {
                dy = -dy;
            } else if(y + dy > canvas.height - ballRadius) {
                if(x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    // change angle slightly depending on where it hit paddle
                    let hitPoint = x - (paddleX + paddleWidth / 2);
                    dx = hitPoint * 0.1;
                } else {
                    gameOver = true;
                }
            }

            if(rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            }
            else if(leftPressed && paddleX > 0) {
                paddleX -= 7;
            }

            x += dx;
            y += dy;

            animationId = requestAnimationFrame(draw);
        };

        const saveProgress = async () => {
            if (window.GameAPI) {
                await window.GameAPI.setProgress(JSON.stringify({ highScore }));
            }
        };

        const initGame = async () => {
            initBricks();
            if (window.GameAPI) {
                try {
                    // Load progress
                    const progressDataStr = await window.GameAPI.getProgress();
                    if (progressDataStr) {
                        const progress = JSON.parse(progressDataStr);
                        if (progress.highScore) {
                            highScore = progress.highScore;
                        }
                    }

                    // Load level
                    const currentLevelInfo = await window.GameAPI.getCurrentLevel();
                    if (currentLevelInfo && currentLevelInfo.levelHtml) {
                        try {
                           const levelData = JSON.parse(currentLevelInfo.levelHtml);
                           document.getElementById('level-title').innerText = levelData.title || ('Breakout Game - Level ' + currentLevelInfo.levelNumber);

                           if (levelData.speed) {
                               let speed = levelData.speed;
                               dx = speed;
                               dy = -speed;
                           }
                           if (levelData.rows) {
                               brickRowCount = levelData.rows;
                               initBricks(); // re-init with new rows
                           }
                        } catch(e) {
                           document.getElementById('level-title').innerText = 'Breakout Game - Level ' + currentLevelInfo.levelNumber;
                        }
                    }
                } catch(e) {
                    console.error('Error initing Game API', e);
                }
            }
            updateScoreDisplay();
            draw();
        };

        // Initialize when API is ready
        if (window.GameAPI) {
            initGame();
        } else {
            window.addEventListener('GameAPIReady', initGame);
        }
    </script>
</body>
</html>
