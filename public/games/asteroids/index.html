<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center;
            background: #000; color: white; font-family: sans-serif;
            margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw;
        }
        canvas { background: #000; display: block; }
        #header { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }
        #level-title { margin: 0; font-size: 1.2rem; pointer-events: auto; }
        #score-board { display: flex; flex-direction: column; text-align: right; pointer-events: auto; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: 50px 50px 50px 50px; gap: 10px; opacity: 0.7; }
        .btn { padding: 15px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.4); }
        #btn-thrust { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-shoot { grid-column: 2; grid-row: 2; background: rgba(255,0,0,0.3); border-color: rgba(255,0,0,0.6); }
        #btn-shoot:active { background: rgba(255,0,0,0.5); }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <div id="header">
        <h2 id="level-title">Asteroids Game</h2>
        <div id="score-board">
            <span id="score-text">Score: 0</span>
            <span id="high-score-text">High Score: 0</span>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn" id="btn-thrust">▲</button>
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-shoot">O</button>
        <button class="btn" id="btn-right">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const resizeCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let score = 0;
        let highScore = 0;
        let animationId;
        let isGameOver = false;
        let gameWon = false;
        let lastTime = 0;

        // Input state
        const keys = {
            ArrowUp: false,
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        // Ship
        const ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            r: 15,
            a: 0, // Angle in radians
            rot: 0,
            thrusting: false,
            dx: 0,
            dy: 0,
            turnSpeed: 360, // degrees per second
            thrust: 150, // acceleration
            blinkNum: 0,
            blinkTime: 10,
            explodeTime: 0
        };

        // Lasers
        let lasers = [];
        const laserSpeed = 300;
        const maxLasers = 10;
        const laserDist = 0.6; // max distance as fraction of canvas width

        // Asteroids
        let asteroids = [];
        let roidsTotal = 3; // level starting total
        let roidsSpeed = 50;
        const roidSize = 50;
        const roidVerts = 10;
        const roidJag = 0.4;

        const distBetweenPoints = (x1, y1, x2, y2) => {
            return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
        };

        const newAsteroid = (x, y, r) => {
            let lvlMult = 1 + 0.1 * roidsSpeed;
            let roid = {
                x: x,
                y: y,
                dx: Math.random() * roidsSpeed * lvlMult / 50 * (Math.random() < 0.5 ? 1 : -1),
                dy: Math.random() * roidsSpeed * lvlMult / 50 * (Math.random() < 0.5 ? 1 : -1),
                r: r,
                a: Math.random() * Math.PI * 2,
                vert: Math.floor(Math.random() * (roidVerts + 1) + roidVerts / 2),
                offs: []
            };
            for (let i = 0; i < roid.vert; i++) {
                roid.offs.push(Math.random() * roidJag * 2 + 1 - roidJag);
            }
            return roid;
        };

        const createAsteroidBelt = () => {
            asteroids = [];
            let x, y;
            for (let i = 0; i < roidsTotal; i++) {
                do {
                    x = Math.floor(Math.random() * canvas.width);
                    y = Math.floor(Math.random() * canvas.height);
                } while (distBetweenPoints(ship.x, ship.y, x, y) < roidSize * 2 + ship.r);
                asteroids.push(newAsteroid(x, y, roidSize));
            }
        };

        const saveProgress = async () => {
            if (window.GameAPI) {
                await window.GameAPI.setProgress(JSON.stringify({ highScore }));
            }
        };

        const destroyAsteroid = (index) => {
            let x = asteroids[index].x;
            let y = asteroids[index].y;
            let r = asteroids[index].r;

            // Split in two if big enough
            if (r > roidSize / 4) {
                asteroids.push(newAsteroid(x, y, r / 2));
                asteroids.push(newAsteroid(x, y, r / 2));
                score += 20;
            } else {
                score += 50;
            }

            asteroids.splice(index, 1);

            if (score > highScore) {
                highScore = score;
                saveProgress();
            }

            if (asteroids.length === 0) {
                gameWon = true;
            }

            updateScoreDisplays();
        };

        const shootLaser = () => {
            if (ship.explodeTime > 0 || isGameOver || gameWon) return;
            if (lasers.length < maxLasers) {
                lasers.push({
                    x: ship.x + 4/3 * ship.r * Math.cos(ship.a),
                    y: ship.y + 4/3 * ship.r * Math.sin(ship.a),
                    dx: laserSpeed * Math.cos(ship.a),
                    dy: laserSpeed * Math.sin(ship.a),
                    distTraveled: 0
                });
            }
        };

        const explodeShip = () => {
            ship.explodeTime = 30; // frames
            isGameOver = true;
        };

        const updateScoreDisplays = () => {
            document.getElementById('score-text').innerText = 'Score: ' + score;
            document.getElementById('high-score-text').innerText = 'High Score: ' + highScore;
        };

        const drawGame = (timestamp) => {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // Cap delta time
            lastTime = timestamp;

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", canvas.width/2, canvas.height/2);
                ctx.font = "16px Arial";
                ctx.fillText("Tap or press space to restart", canvas.width/2, canvas.height/2 + 30);
                return;
            }

            if (gameWon) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Level Complete!", canvas.width/2, canvas.height/2);
                ctx.font = "16px Arial";
                ctx.fillText("Select next level to continue", canvas.width/2, canvas.height/2 + 30);
                return;
            }

            // Move Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].x += lasers[i].dx * dt;
                lasers[i].y += lasers[i].dy * dt;
                lasers[i].distTraveled += Math.sqrt(Math.pow(lasers[i].dx * dt, 2) + Math.pow(lasers[i].dy * dt, 2));

                if (lasers[i].x < 0) lasers[i].x = canvas.width;
                else if (lasers[i].x > canvas.width) lasers[i].x = 0;
                if (lasers[i].y < 0) lasers[i].y = canvas.height;
                else if (lasers[i].y > canvas.height) lasers[i].y = 0;

                if (lasers[i].distTraveled > canvas.width * laserDist) {
                    lasers.splice(i, 1);
                    continue;
                }
            }

            // Move Asteroids
            for (let i = 0; i < asteroids.length; i++) {
                asteroids[i].x += asteroids[i].dx * dt * 50;
                asteroids[i].y += asteroids[i].dy * dt * 50;

                if (asteroids[i].x < 0 - asteroids[i].r) asteroids[i].x = canvas.width + asteroids[i].r;
                else if (asteroids[i].x > canvas.width + asteroids[i].r) asteroids[i].x = 0 - asteroids[i].r;
                if (asteroids[i].y < 0 - asteroids[i].r) asteroids[i].y = canvas.height + asteroids[i].r;
                else if (asteroids[i].y > canvas.height + asteroids[i].r) asteroids[i].y = 0 - asteroids[i].r;
            }

            // Asteroid Collision with Lasers
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let ax = asteroids[i].x;
                let ay = asteroids[i].y;
                let ar = asteroids[i].r;

                for (let j = lasers.length - 1; j >= 0; j--) {
                    if (distBetweenPoints(ax, ay, lasers[j].x, lasers[j].y) < ar) {
                        lasers.splice(j, 1);
                        destroyAsteroid(i);
                        break;
                    }
                }
            }

            // Ship Physics
            if (ship.explodeTime === 0) {
                ship.a += ship.rot * dt;
                if (ship.thrusting) {
                    ship.dx += ship.thrust * Math.cos(ship.a) * dt;
                    ship.dy += ship.thrust * Math.sin(ship.a) * dt;
                } else {
                    ship.dx -= 0.5 * ship.dx * dt;
                    ship.dy -= 0.5 * ship.dy * dt;
                }

                ship.x += ship.dx;
                ship.y += ship.dy;

                if (ship.x < 0 - ship.r) ship.x = canvas.width + ship.r;
                else if (ship.x > canvas.width + ship.r) ship.x = 0 - ship.r;
                if (ship.y < 0 - ship.r) ship.y = canvas.height + ship.r;
                else if (ship.y > canvas.height + ship.r) ship.y = 0 - ship.r;

                // Asteroid Collision with Ship
                for (let i = 0; i < asteroids.length; i++) {
                    if (distBetweenPoints(ship.x, ship.y, asteroids[i].x, asteroids[i].y) < ship.r + asteroids[i].r) {
                        explodeShip();
                        destroyAsteroid(i);
                        break;
                    }
                }
            }

            // Draw Asteroids
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "slategrey";
            for (let i = 0; i < asteroids.length; i++) {
                let a = asteroids[i];
                ctx.beginPath();
                for (let j = 0; j < a.vert; j++) {
                    ctx.lineTo(
                        a.x + a.r * a.offs[j] * Math.cos(a.a + j * Math.PI * 2 / a.vert),
                        a.y + a.r * a.offs[j] * Math.sin(a.a + j * Math.PI * 2 / a.vert)
                    );
                }
                ctx.closePath();
                ctx.stroke();
            }

            // Draw Lasers
            ctx.fillStyle = "salmon";
            for (let i = 0; i < lasers.length; i++) {
                ctx.beginPath();
                ctx.arc(lasers[i].x, lasers[i].y, 2, 0, Math.PI * 2, false);
                ctx.fill();
            }

            // Draw Ship
            if (ship.explodeTime > 0) {
                ctx.fillStyle = "darkred";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 1.5, 0, Math.PI * 2, false);
                ctx.fill();
                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r, 0, Math.PI * 2, false);
                ctx.fill();
                ctx.fillStyle = "orange";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 0.5, 0, Math.PI * 2, false);
                ctx.fill();
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 0.2, 0, Math.PI * 2, false);
                ctx.fill();
                ship.explodeTime--;
            } else {
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(
                    ship.x + 4/3 * ship.r * Math.cos(ship.a),
                    ship.y + 4/3 * ship.r * Math.sin(ship.a)
                );
                ctx.lineTo(
                    ship.x - ship.r * (2/3 * Math.cos(ship.a) + Math.sin(ship.a)),
                    ship.y - ship.r * (2/3 * Math.sin(ship.a) - Math.cos(ship.a))
                );
                ctx.lineTo(
                    ship.x - ship.r * (2/3 * Math.cos(ship.a) - Math.sin(ship.a)),
                    ship.y - ship.r * (2/3 * Math.sin(ship.a) + Math.cos(ship.a))
                );
                ctx.closePath();
                ctx.stroke();

                if (ship.thrusting) {
                    ctx.fillStyle = "red";
                    ctx.strokeStyle = "yellow";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(
                        ship.x - ship.r * (2/3 * Math.cos(ship.a)),
                        ship.y - ship.r * (2/3 * Math.sin(ship.a))
                    );
                    ctx.lineTo(
                        ship.x - ship.r * (2/3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
                        ship.y - ship.r * (2/3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
                    );
                    ctx.lineTo(
                        ship.x - ship.r * (2/3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
                        ship.y - ship.r * (2/3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
                    );
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
            }

            animationId = requestAnimationFrame(drawGame);
        };

        const resetGame = () => {
            ship.x = canvas.width / 2;
            ship.y = canvas.height / 2;
            ship.a = -Math.PI / 2; // Face up
            ship.dx = 0;
            ship.dy = 0;
            ship.explodeTime = 0;
            lasers = [];
            score = 0;
            isGameOver = false;
            gameWon = false;
            createAsteroidBelt();
            updateScoreDisplays();
            lastTime = performance.now();
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(drawGame);
        };

        document.addEventListener("keydown", (e) => {
            if (["ArrowUp", "ArrowLeft", "ArrowRight", " ", "w", "a", "d"].includes(e.key)) {
                e.preventDefault();
            }
            if (isGameOver || gameWon) {
                if (e.key === " ") resetGame();
                return;
            }
            if (e.key === "ArrowLeft" || e.key === "a") { ship.rot = -ship.turnSpeed / 180 * Math.PI; keys.ArrowLeft = true; }
            if (e.key === "ArrowRight" || e.key === "d") { ship.rot = ship.turnSpeed / 180 * Math.PI; keys.ArrowRight = true; }
            if (e.key === "ArrowUp" || e.key === "w") { ship.thrusting = true; ship.thrust = 150; keys.ArrowUp = true; }
            if (e.key === " " && !keys.Space) { keys.Space = true; shootLaser(); }
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") { if(!keys.ArrowRight) ship.rot = 0; keys.ArrowLeft = false; }
            if (e.key === "ArrowRight" || e.key === "d") { if(!keys.ArrowLeft) ship.rot = 0; keys.ArrowRight = false; }
            if (e.key === "ArrowUp" || e.key === "w") { ship.thrusting = false; keys.ArrowUp = false; }
            if (e.key === " ") { keys.Space = false; }
        });

        // Touch
        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); ship.rot = -ship.turnSpeed / 180 * Math.PI; });
        document.getElementById('btn-left').addEventListener('pointerup', (e) => { e.preventDefault(); ship.rot = 0; });
        document.getElementById('btn-left').addEventListener('pointerleave', (e) => { e.preventDefault(); ship.rot = 0; });

        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); ship.rot = ship.turnSpeed / 180 * Math.PI; });
        document.getElementById('btn-right').addEventListener('pointerup', (e) => { e.preventDefault(); ship.rot = 0; });
        document.getElementById('btn-right').addEventListener('pointerleave', (e) => { e.preventDefault(); ship.rot = 0; });

        document.getElementById('btn-thrust').addEventListener('pointerdown', (e) => { e.preventDefault(); ship.thrusting = true; ship.thrust = 150; });
        document.getElementById('btn-thrust').addEventListener('pointerup', (e) => { e.preventDefault(); ship.thrusting = false; });
        document.getElementById('btn-thrust').addEventListener('pointerleave', (e) => { e.preventDefault(); ship.thrusting = false; });

        document.getElementById('btn-shoot').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (isGameOver || gameWon) resetGame();
            else shootLaser();
        });

        const initGame = async () => {
            if (window.GameAPI) {
                try {
                    const progressDataStr = await window.GameAPI.getProgress();
                    if (progressDataStr) {
                        const progress = JSON.parse(progressDataStr);
                        if (progress.highScore) {
                            highScore = progress.highScore;
                        }
                    }

                    const currentLevelInfo = await window.GameAPI.getCurrentLevel();
                    if (currentLevelInfo && currentLevelInfo.levelHtml) {
                        try {
                            const levelData = JSON.parse(currentLevelInfo.levelHtml);
                            document.getElementById('level-title').innerText = levelData.title || ('Asteroids - Level ' + currentLevelInfo.levelNumber);
                            if (levelData.asteroids) roidsTotal = levelData.asteroids;
                            if (levelData.asteroidSpeed) roidsSpeed = 50 * levelData.asteroidSpeed;
                        } catch (e) {
                            document.getElementById('level-title').innerText = 'Asteroids - Level ' + currentLevelInfo.levelNumber;
                        }
                    }
                } catch (e) {
                    console.error('Error initing Game API', e);
                }
            }
            updateScoreDisplays();
            resetGame();
        };

        if (window.GameAPI) {
            initGame();
        } else {
            window.addEventListener('GameAPIReady', initGame);
        }
    </script>
</body>
</html>
